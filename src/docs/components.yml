components:
  schemas:
    # Common schema for User details
    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [user, admin]
        phone:
          type: string
        countryCode:
          type: string
      example:
        id: 5ebac534954b54139806c112
        email: fake@example.com
        name: fake name
        role: user
        phone: "1234567890"
        countryCode: "+91"

    # Common schema for Token information
    Token:
      type: object
      properties:
        token:
          type: string
        expires:
          type: string
          format: date-time
      example:
        token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiI1ZWJhYzUzNDk1NGI1NDEzOTgwNmMxMTIiLCJpYXQiOjE1ODkyOTg0ODQsImV4cCI6MTU4OTMwMDI4NH0.m1U63blB0MLej_WfB7yC2FTMnCziif9X8yzwDEfJXAg
        expires: 2020-05-12T16:18:04.793Z

    # Common schema for authentication tokens (access and refresh)
    AuthTokens:
      type: object
      properties:
        access:
          $ref: '#/components/schemas/Token'
        refresh:
          $ref: '#/components/schemas/Token'

    # Common Error schema for handling errors
    Error:
      type: object
      properties:
        code:
          type: number
        message:
          type: string

    # Customer details with embedded data about the customer and pagination
    Customer:
      type: object
      properties:
        role:
          type: string
          example: "user"
        isEmailVerified:
          type: boolean
          example: false
        issued:
          type: boolean
          example: true
        blocked:
          type: boolean
          example: false
        status:
          type: boolean
          example: false
        _id:
          type: string
          example: "6784e6eab31173ee7dc09392"
        firstName:
          type: string
          example: "Customer"
        lastName:
          type: string
          example: "Twu"
        email:
          type: string
          example: "customer121@yopmail.com"
        age:
          type: string
          example: "12-07-2005"
        phone:
          type: string
          example: "+784521036"
        dl:
          type: string
          example: "8976456132123"
        address:
          type: string
          example: "654sad6as4d6 564as56d4as56d4as"
        tagId:
          type: object
          properties:
            _id:
              type: string
              example: "6784e708b31173ee7dc0939d"
            tagId:
              type: string
              example: "54333823"
            role:
              type: string
              example: "Floor Attendant"
        image:
          type: string
          example: "http://localhost:3001/uploads/1736415315913.jpeg"
        floorAttendant:
          type: object
          properties:
            _id:
              type: string
              example: "6780df7d001148ad4b6085ab"
            name:
              type: string
              example: "Attendant"
            email:
              type: string
              example: "attendant@yopmail.com"
        createdAt:
          type: string
          format: date-time
          example: "2025-01-13T10:11:54.663Z"
        updatedAt:
          type: string
          format: date-time
          example: "2025-01-13T10:17:10.855Z"
    
    # Response schema for paginated customer fetch results
    CustomerFetchedResponse:
      type: object
      properties:
        message:
          type: string
          example: "Customer Fetched"
        data:
          type: object
          properties:
            customers:
              type: array
              items:
                $ref: '#/components/schemas/Customer'
            pagination:
              type: object
              properties:
                currentPage:
                  type: integer
                  example: 1
                totalPages:
                  type: integer
                  example: 2
                totalRecords:
                  type: integer
                  example: 2
                pageSize:
                  type: integer
                  example: 1

  responses:
    # Common Error responses
    DuplicateEmail:
      description: Email already taken
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: 400
            message: Email already taken
    
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: 401
            message: Please authenticate
    
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: 403
            message: Forbidden
    
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: 404
            message: Not found

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
